<html>
<head>
<title> PATIENT RECORD ENTRY DETAILS </title></head>
<body>
<h2><b><center> PATIENT RECORD ENTRY DETAILS </h2></b></center> 
<hr>
<br>
<table>
<tr>
<td>Patient name:</td>
<td><Input type="text"></td>
</tr>
<tr>
<td>Patient ID:</td>
<td><Input type="text"></td>
</tr>
<tr>
<td>Gender:</td>
<td><input type="radio" name="gender">Male<input type="radio" name="gender">Female</td>
</tr>
<tr>
<td>Reason of Visit:</td>
<td><text area></td>
</tr>
<tr>
<td>Dept you visit:</td>
<td><select>
<option>Cardiologist</option>
<option>Dermatologist</option>
<option>ENT</option>
<option>Child Specalist</option>
</select>
<br><br>
</tr>
<tr>
<td>Have you visited before?</td>
<td><input type="radio" name="visit">Yes  <input type="radio" name="visit">No</td>
</tr>
<tr>
<td>Blood Group:</td>
<tr><td><input type="radio" name="bloodgrp">O+ve</tr></td>
<tr><td><input type="radio" name="bloodgrp">A+ve</tr></td>
<tr><td><input type="radio" name="bloodgrp">O-ve</tr></td>
<tr><td><input type="radio" name="bloodgrp">A1+ve</tr></td>
<tr><td><input type="radio" name="bloodgrp">B+ve</tr></td>
</tr>
<tr>
<td>Address:</td>
<td><textarea rows="20" cols="40"></textarea><br></td>
</tr>
<br></br>
<tr>
<td>Age:</td>
<td><Input type="text"></td>
</tr>
<tr>
<td>Upload Your Report: <input type="file"><br></td>
</tr>
</table>

<br><br>

<center>
    <input type="submit" value="Submit">
</center>

</body>
</html>
